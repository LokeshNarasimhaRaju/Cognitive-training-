<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --accent: #3b82f6; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app { width: 500px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); text-align: center; }
        
        .stage { display: none; }
        #game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0; }
        .icon-tile { height: 100px; border-radius: 16px; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; transition: 0.2s; }
        .icon-tile.active { border-color: var(--accent); background: #eff6ff; transform: scale(1.05); }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 24px; border-radius: 10px; border: none; background: var(--text); color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="briefing" class="stage" style="display:block;">
        <h2>Sequence Recovery</h2>
        <p>Maintain the sequence in memory. When the screen flashes, categorize the symbol quickly before resuming.</p>
        <button onclick="Game.init(0)">START MISSION</button>
    </div>

    <div id="game" class="stage">
        <h3 id="status">Observing...</h3>
        <div id="game-grid" class="grid">
            <div class="icon-tile" onclick="Game.input(0)">🌐</div><div class="icon-tile" onclick="Game.input(1)">📡</div><div class="icon-tile" onclick="Game.input(2)">🛰️</div>
            <div class="icon-tile" onclick="Game.input(3)">⚛️</div><div class="icon-tile" onclick="Game.input(4)">🔭</div><div class="icon-tile" onclick="Game.input(5)">🧬</div>
            <div class="icon-tile" onclick="Game.input(6)">🔬</div><div class="icon-tile" onclick="Game.input(7)">🔋</div><div class="icon-tile" onclick="Game.input(8)">⚙️</div>
        </div>
        <div id="timer">Target Accuracy: 100%</div>
    </div>

    <div id="results" class="stage">
        <h2>Mission Complete</h2>
        <p id="perf-metrics"></p>
        <div class="controls">
            <button onclick="Game.init(0)">RETRY</button>
            <button onclick="location.reload()">HOME</button>
        </div>
    </div>
</div>

<script>
    const Game = {
        lvl: 0, seq: [], inputIdx: 0,
        icons: ['🌐', '📡', '🛰️', '⚛️', '🔭', '🧬', '🔬', '🔋', '⚙️'],
        
        async init(level) {
            this.lvl = level; this.seq = []; this.inputIdx = 0;
            document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
            document.getElementById('game').style.display = 'block';
            
            // Build sequence (Length 4 to 8)
            for(let i=0; i < 4 + this.lvl; i++) this.seq.push(Math.floor(Math.random()*9));
            
            const mid = Math.floor(this.seq.length / 2);
            for(let i=0; i < this.seq.length; i++) {
                if(i === mid) {
                    document.getElementById('status').innerText = "!! TASK INTERRUPT !!";
                    await new Promise(r => setTimeout(r, 1000));
                }
                this.highlight(this.seq[i]);
                await new Promise(r => setTimeout(r, 800));
            }
            document.getElementById('status').innerText = "RECOVER SEQUENCE";
        },

        highlight(i) {
            const el = document.querySelectorAll('.icon-tile')[i];
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 500);
        },

        input(i) {
            if(i === this.seq[this.inputIdx]) {
                this.highlight(i);
                this.inputIdx++;
                if(this.inputIdx === this.seq.length) this.finish();
            } else {
                document.getElementById('status').innerText = "ERROR - RESTARTING";
                setTimeout(() => this.init(this.lvl), 1000);
            }
        },

        finish() {
            if(this.lvl < 4) {
                this.lvl++; setTimeout(() => this.init(this.lvl), 1000);
            } else {
                document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
                document.getElementById('results').style.display = 'block';
                document.getElementById('perf-metrics').innerText = "All patterns recovered successfully.";
            }
        }
    }
</script>
</body>
</html>
