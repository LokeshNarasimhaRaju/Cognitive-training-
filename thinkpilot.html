<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkPilot | PEJ</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --olive-deep:   #3A4E1C;
    --olive:        #5A6E2E;
    --olive-mid:    #7A9040;
    --beige-pale:   #FAF4E4;
    --cream:        #FEFCF0;
    --text-dark:    #1A2408;
    --text-mid:     #2E4010;
    --gold:         #B8913A;
    --gold-lt:      #D4AB54;
    --error-red:    #a63c3c;
    --success-green:#4c853e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #1A2408 0%, var(--olive-deep) 100%);
    min-height: 100vh;
    font-family: 'Raleway', sans-serif;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Return to Base Button */
  .back-btn {
    position: absolute;
    top: 30px;
    left: 40px;
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-lt);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.3s;
  }
  .back-btn:hover { color: var(--beige-pale); }

  /* Main Container */
  .quiz-container {
    background: var(--beige-pale);
    color: var(--text-dark);
    max-width: 800px;
    width: 100%;
    border-radius: 4px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    overflow: hidden;
    position: relative;
    display: none; 
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .quiz-container.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Loading State */
  #loader {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--gold-lt);
    animation: pulse 1.5s infinite alternate;
  }
  @keyframes pulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* Quiz Header */
  .quiz-header {
    background: linear-gradient(135deg, var(--olive-deep) 0%, var(--olive) 100%);
    padding: 30px 40px;
    border-bottom: 4px solid var(--gold);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .quiz-category {
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-lt);
    margin-bottom: 8px;
  }

  .quiz-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 1px;
  }

  .quiz-stats {
    text-align: right;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
  }
  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold-lt);
  }

  /* Quiz Body */
  .quiz-body { padding: 40px; }

  .question-text {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 32px;
    color: var(--text-dark);
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .option-btn {
    background: white;
    border: 2px solid rgba(90,110,46,0.2);
    padding: 16px 24px;
    border-radius: 4px;
    font-family: 'Raleway', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-mid);
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--olive);
    background: rgba(90,110,46,0.05);
    transform: translateY(-2px);
  }
  .option-letter {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--olive);
    background: rgba(90,110,46,0.1);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  /* States */
  .option-btn.selected { border-color: var(--gold); background: rgba(184,145,58,0.1); }
  .option-btn.correct { border-color: var(--success-green); background: rgba(76,133,62,0.1); color: var(--success-green); }
  .option-btn.incorrect { border-color: var(--error-red); background: rgba(166,60,60,0.1); color: var(--error-red); }

  /* Explanation Box */
  .explanation-box {
    background: rgba(184,145,58,0.1);
    border-left: 4px solid var(--gold);
    padding: 20px;
    margin-bottom: 32px;
    border-radius: 0 4px 4px 0;
    display: none;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
  
  .explanation-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--olive-deep);
    margin-bottom: 8px;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .explanation-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-mid);
  }

  /* Controls */
  .quiz-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(0,0,0,0.1);
    padding-top: 24px;
  }

  .btn {
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 32px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
  }

  .btn-submit {
    background: var(--olive-deep);
    color: var(--beige-pale);
    box-shadow: 0 4px 16px rgba(42,58,18,0.3);
  }
  .btn-submit:hover:not(:disabled) { background: var(--olive); transform: translateY(-2px); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Final Score Screen */
  .final-screen {
    text-align: center;
    padding: 60px 40px;
    display: none;
  }
  .final-icon { font-size: 64px; margin-bottom: 24px; }
  .final-title {
    font-family: 'Cinzel', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--olive-deep);
    margin-bottom: 16px;
  }
  .final-score-text { font-size: 18px; color: var(--text-mid); margin-bottom: 40px; }
  
</style>
</head>
<body>

  <a href="index.html#thinkpilot" class="back-btn">← Abort Mission</a>

  <div id="loader">Accessing ThinkPilot Telemetry...</div>

  <div class="quiz-container" id="quiz-app">
    
    <div class="quiz-header" id="quiz-header">
      <div>
        <div class="quiz-category" id="sub-category-display">THINKPILOT</div>
        <div class="quiz-title" id="category-display">Loading...</div>
      </div>
      <div class="quiz-stats">
        <div class="stat-label">Telemetry Status</div>
        <div class="stat-value"><span id="current-q-num">1</span> / <span id="total-q-num">0</span></div>
      </div>
    </div>

    <div class="quiz-body" id="quiz-body">
      <div class="question-text" id="question-text">
        Waiting for data...
      </div>

      <div class="options-grid" id="options-grid"></div>

      <div class="explanation-box" id="explanation-box">
        <div class="explanation-title">Flight Path Analysis</div>
        <div class="explanation-text" id="explanation-text"></div>
      </div>

      <div class="quiz-controls">
        <div style="font-weight: 600; color: var(--olive); font-size: 14px;">
          Score: <span id="live-score">0</span>
        </div>
        <button class="btn btn-submit" id="action-btn" onclick="handleAction()" disabled>Lock Answer</button>
      </div>
    </div>

    <div class="final-screen" id="final-screen">
      <div class="final-icon">✈</div>
      <div class="final-title">Evaluation Complete</div>
      <div class="final-score-text">
        You successfully navigated <strong id="final-score">0</strong> out of <strong id="final-total">0</strong> cognitive scenarios.
      </div>
      <button class="btn btn-submit" onclick="location.reload()">Restart Simulation</button>
    </div>

  </div>

  <script>
    let questionsData = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptionIndex = null;
    let isAnswered = false;

    // Get Module from URL
    const urlParams = new URLSearchParams(window.location.search);
    const moduleFile = urlParams.get('module') || 'Situational Awareness.json'; 
    let moduleTitle = urlParams.get('title') || moduleFile.replace('.json', '');

    // UI Elements
    const loader = document.getElementById('loader');
    const quizApp = document.getElementById('quiz-app');
    const quizHeader = document.getElementById('quiz-header');
    const quizBody = document.getElementById('quiz-body');
    const finalScreen = document.getElementById('final-screen');
    
    const subCategoryDisplay = document.getElementById('sub-category-display');
    const categoryDisplay = document.getElementById('category-display');
    const currentQNum = document.getElementById('current-q-num');
    const totalQNum = document.getElementById('total-q-num');
    const questionText = document.getElementById('question-text');
    const optionsGrid = document.getElementById('options-grid');
    const actionBtn = document.getElementById('action-btn');
    const explanationBox = document.getElementById('explanation-box');
    const explanationText = document.getElementById('explanation-text');
    const liveScore = document.getElementById('live-score');

    categoryDisplay.textContent = decodeURIComponent(moduleTitle);

    // Normalize varying JSON structures into a flat array of questions
    function extractQuestions(data) {
        let extracted = [];
        
        // Helper to normalize single question object
        const parseQ = (item) => {
            return {
                question: item.question,
                options: item.options,
                // Handle different key naming conventions across JSONs
                correctAnswer: item.correctAnswer !== undefined ? item.correctAnswer : item.correct_option_index, 
                explanation: item.explanation,
                subCategory: item.subCategory || item.sub_category || item.type || moduleTitle
            };
        };

        if (Array.isArray(data)) {
            data.forEach(item => {
                if (item.questions && Array.isArray(item.questions)) {
                    // Nested array style (e.g. Problem Solving.json)
                    item.questions.forEach(q => extracted.push(parseQ(q)));
                } else if (item.question && item.options) {
                    // Flat array style (e.g. Situational Awareness.json)
                    extracted.push(parseQ(item));
                }
            });
        } else if (data && data.questions && Array.isArray(data.questions)) {
            // Root object with 'questions' array (e.g. Flight Path Mgmt)
            data.questions.forEach(q => extracted.push(parseQ(q)));
        }
        return extracted;
    }

    // Fetch JSON Data
    fetch(moduleFile)
      .then(response => {
        if (!response.ok) throw new Error("Network response was not ok");
        return response.text(); 
      })
      .then(text => {
        // Simple cleanup in case JSON is malformed with concatenated blocks 
        // (Addresses the format pasted in the prompt)
        const cleanText = text.replace(/}\s*\{/g, '},{'); 
        let parsed;
        try {
            parsed = JSON.parse(cleanText);
        } catch(e) {
            // If it's a concatenated object list without array brackets, wrap it
            parsed = JSON.parse('[' + cleanText + ']'); 
        }
        questionsData = extractQuestions(parsed);
        if(questionsData.length === 0) throw new Error("No questions found in data.");
        initQuiz();
      })
      .catch(error => {
        console.error("Error loading JSON:", error);
        loader.innerHTML = `Error: Unable to connect to flight data for ${moduleFile}.<br><span style='font-size:14px; font-family:Raleway; text-transform:none;'>Please ensure the file exists and is running through a local web server.</span>`;
      });

    function initQuiz() {
      loader.style.display = 'none';
      quizApp.style.display = 'block';
      setTimeout(()=> quizApp.classList.add('visible'), 50); // fade in
      totalQNum.textContent = questionsData.length;
      loadQuestion();
    }

    function loadQuestion() {
      const q = questionsData[currentQuestionIndex];
      
      selectedOptionIndex = null;
      isAnswered = false;
      actionBtn.textContent = "Lock Answer";
      actionBtn.disabled = true;
      explanationBox.style.display = 'none';
      optionsGrid.innerHTML = '';

      subCategoryDisplay.textContent = q.subCategory;
      currentQNum.textContent = currentQuestionIndex + 1;
      questionText.textContent = q.question;

      const letters = ['A', 'B', 'C', 'D', 'E'];
      q.options.forEach((optText, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${letters[index]}</span> <span>${optText}</span>`;
        btn.onclick = () => selectOption(index);
        optionsGrid.appendChild(btn);
      });
    }

    function selectOption(index) {
      if (isAnswered) return; 

      selectedOptionIndex = index;
      actionBtn.disabled = false;

      const buttons = optionsGrid.querySelectorAll('.option-btn');
      buttons.forEach(b => b.classList.remove('selected'));
      buttons[index].classList.add('selected');
    }

    function handleAction() {
      const q = questionsData[currentQuestionIndex];

      if (!isAnswered) {
        isAnswered = true;
        const buttons = optionsGrid.querySelectorAll('.option-btn');
        const correctIndex = parseInt(q.correctAnswer, 10);

        buttons.forEach(b => b.disabled = true);

        if (selectedOptionIndex === correctIndex) {
          buttons[selectedOptionIndex].classList.add('correct');
          score++;
          liveScore.textContent = score;
        } else {
          buttons[selectedOptionIndex].classList.add('incorrect');
          if(buttons[correctIndex]) {
            buttons[correctIndex].classList.add('correct');
          }
        }

        explanationText.textContent = q.explanation || "No explanation provided.";
        explanationBox.style.display = 'block';
        actionBtn.textContent = "Next Vector →";

      } else {
        currentQuestionIndex++;
        if (currentQuestionIndex < questionsData.length) {
          loadQuestion();
        } else {
          showFinalScreen();
        }
      }
    }

    function showFinalScreen() {
      quizHeader.style.display = 'none';
      quizBody.style.display = 'none';
      finalScreen.style.display = 'block';
      
      document.getElementById('final-score').textContent = score;
      document.getElementById('final-total').textContent = questionsData.length;
    }
  </script>
</body>
</html>
