<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Memory Game</title>
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: linear-gradient(135deg, #fdfcfb 0%, #e2e1e0 100%); 
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; 
        }

        #game-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.8);
            text-align: center;
            width: 350px;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: 700; color: #444; }
        
        #grid { display: grid; grid-template-columns: repeat(3, 90px); gap: 15px; margin-bottom: 30px; justify-content: center; }
        
        .tile { 
            width: 90px; height: 90px; border-radius: 20px; cursor: pointer; 
            transition: all 0.2s ease; opacity: 0.8; 
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .tile:hover { opacity: 0.9; transform: translateY(-2px); }
        .tile.active { opacity: 1; transform: scale(0.95); box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        
        button { 
            padding: 12px 40px; font-size: 16px; border: none; border-radius: 12px; 
            background: #2d3436; color: white; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #636e72; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div id="level-display">Level: 1</div>
        <div id="score-display">Score: 0</div>
    </div>
    <div id="grid"></div>
    <button id="action-btn" onclick="startGame()">Start Game</button>
    <div id="message" style="margin-top:20px; color:#636e72;">Press Start to begin</div>
</div>

<script>
    const levels = [
        { tiles: 5, seqLen: 3, speed: 800 },
        { tiles: 5, seqLen: 4, speed: 700 },
        { tiles: 5, seqLen: 5, speed: 600 },
        { tiles: 6, seqLen: 6, speed: 500 },
        { tiles: 6, seqLen: 7, speed: 400 }
    ];

    let currentLevel = 0;
    let sequence = [];
    let userSeq = [];
    let isPlaying = false;
    const colors = ['#8FC3A5', '#F4B8C6', '#9FD8C2', '#AEB8D9', '#F4E3A6', '#CDE2A8'];
    const grid = document.getElementById('grid');
    const actionBtn = document.getElementById('action-btn');

    function createGrid(num) {
        grid.innerHTML = '';
        for(let i=0; i<num; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.style.backgroundColor = colors[i % colors.length];
            tile.onclick = () => handleTileClick(i);
            grid.appendChild(tile);
        }
    }

    function startGame() {
        if(isPlaying) return;
        currentLevel = 0;
        actionBtn.style.display = 'none'; // Hide button during gameplay
        playLevel();
    }

    async function playLevel() {
        isPlaying = true;
        userSeq = [];
        const lvl = levels[currentLevel];
        document.getElementById('level-display').innerText = `Level: ${currentLevel + 1}`;
        document.getElementById('message').innerText = "Watch carefully...";
        createGrid(lvl.tiles);
        
        sequence = Array.from({length: lvl.seqLen}, () => Math.floor(Math.random() * lvl.tiles));
        
        for(let i of sequence) {
            await new Promise(r => setTimeout(r, 600));
            const tiles = document.querySelectorAll('.tile');
            tiles[i].classList.add('active');
            await new Promise(r => setTimeout(r, lvl.speed));
            tiles[i].classList.remove('active');
        }
        document.getElementById('message').innerText = "Your turn!";
    }

    function handleTileClick(index) {
        if(!isPlaying || userSeq.length >= sequence.length) return;
        
        userSeq.push(index);
        const tiles = document.querySelectorAll('.tile');
        tiles[index].classList.add('active');
        setTimeout(() => tiles[index].classList.remove('active'), 200);

        if(userSeq[userSeq.length-1] !== sequence[userSeq.length-1]) {
            endGame("Incorrect! Game Over.");
            return;
        }

        if(userSeq.length === sequence.length) {
            document.getElementById('message').innerText = "Correct!";
            currentLevel++;
            if(currentLevel < levels.length) {
                setTimeout(playLevel, 1000);
            } else {
                endGame("You Won!");
            }
        }
    }

    function endGame(msg) {
        isPlaying = false;
        document.getElementById('message').innerText = msg;
        actionBtn.innerText = "Retry";
        actionBtn.style.display = 'inline-block';
    }
</script>
</body>
</html>
